version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: mysql-compose
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: 12345678
      MYSQL_DATABASE: product
    ports:
      - "3307:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      retries: 5
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - spring-net

  # ── Redis 서버 ────────────────────────────────────────────────
  redis:
    image: redis:8-alpine
    container_name: redis-compose
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - spring-net

volumes:
  mysql_data:

networks:
  spring-net:
    name: spring-net
    external: true